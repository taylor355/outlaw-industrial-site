<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Request Sent | Outlaw Industrial</title>
    <style>
      :root {
        --black: #111111;
        --paper: #fbfaf7;
        --muted: #6d6a63;
        --orange: #d7651f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--paper);
        color: var(--black);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      main {
        width: min(720px, calc(100% - 40px));
      }

      .label {
        color: var(--orange);
        font-size: 0.76rem;
        font-weight: 900;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 20px 0;
        font-size: clamp(2.4rem, 8vw, 5rem);
        line-height: 0.94;
        text-transform: uppercase;
      }

      p {
        color: var(--muted);
        font-size: 1.08rem;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        margin-top: 22px;
        padding: 0 19px;
        background: var(--orange);
        color: #ffffff;
        font-size: 0.86rem;
        font-weight: 900;
        letter-spacing: 0.03em;
        text-decoration: none;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <main>
      <span class="label">Request Sent</span>
      <h1>Thanks. We received your request.</h1>
      <p>Outlaw Industrial will follow up as soon as possible.</p>
      <a href="/">Back to site</a>
    </main>
  </body>
</html>
